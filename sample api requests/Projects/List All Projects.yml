info:
  name: List All Projects
  type: http
http:
  method: GET
  url: "{{baseUrl}}/v1/projects"
  params:
    - name: limit
      value: "20"
      type: query
    - name: offset
      value: "0"
      type: query
  headers:
    - name: X-User-ID
      value: "{{userId}}"
runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function() {
          expect(res.status).to.equal(200);
        });