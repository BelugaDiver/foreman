info:
  name: Upload Image
  type: http
  seq: 1

http:
  method: PUT
  url: "{{uploadUrl}}"
  body:
    type: file
    data:
      - filePath: Images/Sample Image.jpeg
        contentType: image/jpeg
        selected: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
