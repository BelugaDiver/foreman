info:
  name: Delete Image
  type: http
http:
  method: DELETE
  url: "{{baseUrl}}/v1/images/{{imageId}}"
  headers:
    - name: X-User-ID
      value: "{{userId}}"
runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 204", function() {
          expect(res.status).to.equal(204);
        });