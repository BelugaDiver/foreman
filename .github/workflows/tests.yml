name: Tests

on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run foreman unit tests
        run: pytest tests/foreman/ --ignore=tests/foreman/integration -v

      - name: Run worker unit tests
        run: pytest tests/worker/ -v

      - name: Run integration tests
        run: |
          docker info
          pytest tests/foreman/integration -v

      - name: Check coverage
        run: |
          pytest --cov=foreman --cov=worker --cov-report=term --cov-fail-under=85
